services:
  postgres:
    image: postgres:16
    container_name: luxvita-postgres
    environment:
      POSTGRES_DB:       luxvita
      POSTGRES_USER:     luxvita
      POSTGRES_PASSWORD: luxvita
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luxvita -d luxvita"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
